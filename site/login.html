<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REST API Test System - Login</title>
<link rel="stylesheet" href="styles.css">
</head>

<body class="login-body">

<div class="login-container">

<img
  src="img/istok_logo.jpg"
  alt="Istok"
  class="login-logo"
>

<form id="loginForm">

<input
type="text"
id="username"
placeholder="Имя пользователя"
required
>

<input
type="password"
id="password"
placeholder="Пароль"
required
>

<button type="submit">
Войти
</button>

</form>

<div id="error" class="error"></div>

</div>

<script src="app.js"></script>

</body>
</html>
